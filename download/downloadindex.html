<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Simulation</title>
    <link rel="stylesheet" href="downloadstyle.css">
</head>
<body>

    <div class="card">
        <h2>Download Simulation</h2>

        <div class="file-info">
            <span>File.zip</span>
            <span id="percentage">0%</span>
        </div>

        <div class="progress-bar">
            <div class="progress" id="progress"></div>
        </div>

        <p id="status">Ready to download</p>

        <button id="downloadBtn">
            Start Download
        </button>
    </div>
    <script src="downloadscrip.js"></script>

</body>
</html>
